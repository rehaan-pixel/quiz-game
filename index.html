<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 50%, #0d9488 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 200%; height: 200%;
            background-image: radial-gradient(circle at 25px 30px, rgba(255,255,255,0.6) 4px, transparent 4px),
                              radial-gradient(circle at 80px 80px, rgba(255,255,255,0.4) 6px, transparent 6px);
            background-size: 180px 180px;
            animation: polkaFloat 25s linear infinite;
            pointer-events: none;
            opacity: 0.15;
            z-index: -1;
        }
        @keyframes polkaFloat { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(30px, 40px) rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(20, 184, 166, 0.3);
            max-width: 650px;
            width: 100%;
            text-align: center;
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .container:hover { transform: scale(1); }
        h1 {
            color: #0f172a;
            margin-bottom: 1.5rem;
            font-size: 2.3em;
            font-weight: 700;
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #start-screen {
            max-width: 400px; margin: 0 auto;
        }
        input[type="text"] {
            width: 100%; padding: 15px; margin: 1.5rem 0;
            border: 2px solid rgba(20, 184, 166, 0.3);
            border-radius: 25px; font-size: 16px; text-align: center;
            background: rgba(255,255,255,0.8); transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #14b8a6; box-shadow: 0 0 0 3px rgba(20,184,166,0.2); }
        button {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            color: white; border: none; padding: 14px 28px;
            border-radius: 25px; cursor: pointer; font-size: 1.05em;
            font-weight: 600; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 6px 20px rgba(20, 184, 166, 0.4);
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(20, 184, 166, 0.6); }
        button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        #quiz-container { display: none; }
        .question { background: rgba(248,249,250,0.8); padding: 1.8rem; margin: 1.2rem 0; border-radius: 20px; text-align: left; }
        .question h3 { margin-bottom: 1rem; color: #1e293b; font-size: 1.2em; }
        .options-group { display: flex; flex-direction: column; gap: 1rem; }
.option {
            padding: 1.2rem 1.5rem; background: rgba(248,249,250,0.95);
            border: 2px solid rgba(20,184,166,0.3); border-radius: 15px;
            cursor: pointer; transition: all 0.3s; font-weight: 500; font-size: 1.1rem;
            color: #1e293b !important;
            backdrop-filter: blur(10px);
        }
        .option:hover { border-color: #14b8a6; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(20,184,166,0.2); }
        .option.selected { background: linear-gradient(135deg, #14b8a6, #0d9488); color: white; border-color: #0f766e; }
        #progress { width: 100%; height: 12px; background: rgba(255,255,255,0.5); border-radius: 10px; margin: 2rem 0; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, #14b8a6, #10b981); width: 0%; transition: width 0.4s ease; border-radius: 10px; }
        #result-screen { display: none; }
        #score { font-size: 3em; font-weight: 800; margin: 2rem 0; color: #10b981; }
        #leaderboard { margin-top: 2rem; max-height: 300px; overflow-y: auto; }
        #leaderboard h3 { margin-bottom: 1rem; color: #0f172a; }
        .leaderboard-item { background: rgba(255,255,255,0.8); padding: 1.2rem; margin: 0.8rem 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(20,184,166,0.2); }
        .leaderboard-item:hover { transform: translateX(5px); }
        .hidden { display: none !important; }
        @media (max-width: 480px) { .container { padding: 1.5rem; margin: 1rem; } .leaderboard-item { flex-direction: column; text-align: center; gap: 0.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1>🧠 Simple Quiz</h1>
            <p style="margin-bottom: 1rem; color: #64748b;">Enter name for leaderboard:</p>
            <input type="text" id="player-name" placeholder="Your name..." maxlength="20">
            <br><button id="start-quiz">🚀 Start Quiz (7 Questions)</button>
        </div>

        <div id="quiz-container">
            <div id="progress"><div id="progress-fill"></div></div>
            <div id="all-questions"></div>
            <button id="submit-quiz" class="hidden">✅ Submit & See Results</button>
        </div>

        <div id="result-screen">
            <div id="score">Calculating...</div>
            <div id="leaderboard">
                <h3>🏆 Leaderboard (Top Scores)</h3>
                <div id="leaderboard-list">Loading scores...</div>
            </div>
            <button id="restart-quiz">🔄 Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
